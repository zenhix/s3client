name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      channel:
        description: Release channel
        required: true
        type: choice
        options:
          - stable
          - beta
          - alpha
      platform:
        description: Target platform
        required: true
        type: choice
        options:
          - all
          - macos
          - windows

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - run: pnpm install --frozen-lockfile

      # Lint
      - name: TypeScript type check
        run: pnpm tsc -b --noEmit
      - name: ESLint
        run: pnpm eslint src/
      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check
      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # Test
      - name: Frontend tests
        run: pnpm vitest run
      - name: Backend tests
        working-directory: src-tauri
        run: cargo test

  bump-version:
    name: Bump Version
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(jq -r .version package.json)
          BASE_VERSION=$(echo "$CURRENT" | sed 's/-.*//')
          IFS='.' read -r major minor patch <<< "$BASE_VERSION"

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          CHANNEL="${{ inputs.channel }}"
          if [ "$CHANNEL" = "stable" ]; then
            NEW_VERSION="${major}.${minor}.${patch}"
          else
            TIMESTAMP=$(date +%Y%m%d%H%M)
            NEW_VERSION="${major}.${minor}.${patch}-${CHANNEL}.${TIMESTAMP}"
          fi

          TAG="v${NEW_VERSION}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Update package.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

          # Update tauri.conf.json
          jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

          # Update Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: release ${{ steps.bump.outputs.tag }} (${{ inputs.channel }})"
          git tag "${{ steps.bump.outputs.tag }}"
          git push
          git push --tags

  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: bump-version
    if: inputs.platform == 'all' || inputs.platform == 'macos'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.bump-version.outputs.tag }}
          releaseName: "s3client ${{ needs.bump-version.outputs.tag }} (${{ inputs.channel }})"
          releaseBody: |
            ## s3client ${{ needs.bump-version.outputs.tag }}
            **Channel:** ${{ inputs.channel }}
          releaseDraft: false
          prerelease: ${{ inputs.channel != 'stable' }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true
          args: --target ${{ matrix.target }}

  build-windows:
    name: Build Windows
    needs: bump-version
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.bump-version.outputs.tag }}
          releaseName: "s3client ${{ needs.bump-version.outputs.tag }} (${{ inputs.channel }})"
          releaseBody: |
            ## s3client ${{ needs.bump-version.outputs.tag }}
            **Channel:** ${{ inputs.channel }}
          releaseDraft: false
          prerelease: ${{ inputs.channel != 'stable' }}
          includeUpdaterJson: true
          args: --target x86_64-pc-windows-msvc
